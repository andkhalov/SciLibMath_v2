# E4: Full composite loss with static weights
# Ref: MATH.md M.3.4, M.3.4* (loss anatomy)
experiment: e4_composite_static

loss:
  type: composite
  tau: 0.07
  p_drop: 0.3
  lambda_align: 0.3
  lambda_rad: 0.1
  lambda_reg: 0.05
  lambda_va: 0.1
  w_g: 1.0
  C_clip: 10.0
  rho: 0.1
  alpha_tau: 0.5
  tau_target: 0.0
  tau_min: 0.01
  tau_max: 0.5
  weights:
    en: 1.0
    ru: 1.0
    lean: 1.5   # Higher weight for formal modalities (more signal)
    latex: 1.5
    img: 1.0
