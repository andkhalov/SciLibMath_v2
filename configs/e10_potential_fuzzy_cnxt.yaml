# E10 ConvNeXt: Potential loss + Fuzzy T-S controller + ConvNeXt-Tiny backbone
# Ref: MATH.md M.1.2, M.3.10
# EXP-008: α=0.005, γ=0.002
experiment: e10_potential_fuzzy_cnxt

model:
  visual_backbone: convnext_pico.d1_in1k

loss:
  type: composite
  tau: 0.07
  p_drop: 0.3
  lambda_reg: 0.05
  lambda_va: 0.1
  w_g: 1.0
  C_clip: 10.0
  rho: 0.1
  alpha_tau: 0.5
  tau_target: 0.0
  tau_min: 0.01
  tau_max: 0.5
  use_potential: true
  k_a: 1.0
  k_r: 0.1
  weights:
    en: 1.0
    ru: 1.0
    lean: 1.5
    latex: 1.5
    img: 1.0

controller:
  alpha: 0.005
  warmup_steps: 200
  step_frequency: 10
  noise_sigma: 0.01
  noise_anneal: true
  elastic_gamma: 0.002
