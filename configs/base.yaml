# base.yaml — SciLibMath_v2 common configuration
# All experiment configs inherit from this via OmegaConf merge.
# Ref: writing/MATH.md v2.7, writing/TZ.md v1.7

seed: 42
device: cuda
mixed_precision: true
deterministic: false  # set true for exact reproducibility (slower)

# --- Data (MATH.md M.0, TZ.md Sec 1) ---
data:
  dataset_path: data/scilibrumodal-v2-data
  image_root: data/scilibrumodal-v2-data/img
  batch_size: 64
  dataset_fraction: 1.0  # fraction of data to use (e.g. 0.1 for 10% ablation)
  test_fraction: 0.05  # 5% held-out, NEVER seen during training
  max_length: 128  # SciRus-tiny supports up to 8192; 128 is sufficient for math statements
  num_workers: 4
  pin_memory: true
  # Modality fields from dataset
  fields:
    en: informal_statement_en
    ru: informal_statement_ru
    lean: formal_statement
    latex: formula_md
    img: image  # loaded via ImageLoadingConfig

# --- Tokenizers (MATH.md M.2.3) ---
tokenizer:
  lean_vocab_size: 16000   # train BPE + extend base tokenizer
  latex_vocab_size: 16000  # train BPE + extend base tokenizer
  cache_dir: tokenizers    # cached trained tokenizers
  max_corpus_samples: 0    # 0 = use full corpus for BPE training

# --- Model (MATH.md M.1) ---
model:
  family: A  # A = 5 encoders, B = 2 encoders
  embedding_dim: 256  # d in MATH.md
  # Encoders
  text_backbone: mlsa-iai-msu-lab/sci-rus-tiny3.5-zh  # SciRus-tiny (ModernBERT, 312d, 3 layers)
  lr_embed_ratio: 0.1  # Discriminative LR: backbone gets lr * this, heads get lr
  # Visual encoder (MATH.md M.1.2)
  visual_backbone: resnet18
  visual_pretrained: true
  visual_patch_size: 64
  visual_patch_stride: 32
  visual_align_margin: 1.0  # δ_va for visual alignment loss (MATH.md M.1.2*)
  # EXP-003 visual pipeline fixes
  align_hidden_dim: 512       # AlignNet hidden layer dimension (Fix P2)
  align_dropout: 0.1          # AlignNet dropout rate (Fix P2)
  freeze_resnet_layers: 2     # freeze conv1+bn1+layer1 (1) or +layer2 (2) (Fix P3)
  lr_visual_ratio: 0.5        # visual pipeline LR = lr × this (vs 0.1 for text) (Fix P3)
  visual_align_targets:        # modalities for L_visual_align (Fix P4)
    - latex
    - en
    - lean

# --- Training ---
training:
  epochs: 10
  lr: 1e-4
  weight_decay: 0.01
  optimizer: AdamW
  scheduler: cosine_with_warmup
  warmup_steps: 500
  gradient_clip: 1.0
  gradient_accumulation_steps: 1

# --- Evaluation (TZ.md Sec 9) ---
eval:
  eval_every_steps: 200
  retrieval_k: [1, 3, 10]
  # Scalability test (deferred to full training mode)
  scalability_sizes: [10000, 25000, 50000]

# --- Logging (CLAUDE.md Sec 5) ---
logging:
  tensorboard_dir: runs
  s3_backup: true
  s3_remote: scilib-store
  s3_bucket: scilibmath-v2-logs
  backup_every_minutes: 30
  # What to log
  log_loss_components: true
  log_embeddings_every_steps: 500
  log_similarity_matrix_every_steps: 500

# --- Checkpointing ---
checkpoint:
  dir: checkpoints
  save_every_epochs: 1
  keep_best: 3
  metric: mean_crossmodal_R@1  # primary metric (centroid LOO R@1 saturates — see EXP-001)
  resume_from: null  # path to checkpoint for resuming
