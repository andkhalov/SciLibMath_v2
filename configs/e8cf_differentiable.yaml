# E8cf: Differentiable T-S Fuzzy Controller (EXP-013)
# Same fuzzy controller as E8c, but MLP consequents receive gradient via
# differentiable reaggregation of loss components.
#
# Mechanism: detached loss components × differentiable λ (from MLP).
# Modality weights: softmax(λ[5:10]) × M — redistribute, not suppress.
# Hyperparams: raw + quadratic regularizer μ·Σ(λ−λ₀)² toward defaults.
# MLP anti-collapse: penalty when weight norm drops below min_norm.
experiment: e8cf_differentiable

model:
  visual_backbone: convnext_pico.d1_in1k

loss:
  type: composite
  tau: 0.07
  p_drop: 0.3
  lambda_align: 0.3
  lambda_rad: 0.1
  lambda_reg: 0.05
  lambda_va: 0.01
  w_g: 1.0
  C_clip: 10.0
  rho: 0.1
  alpha_tau: 0.5
  tau_target: 0.0
  tau_min: 0.01
  tau_max: 0.5
  weights:
    en: 1.0
    ru: 1.0
    lean: 1.5
    latex: 1.5
    img: 1.0

controller:
  alpha: 0.01
  warmup_steps: 200
  step_frequency: 10
  noise_sigma: 0.01
  noise_anneal: true
  elastic_gamma: 0.002      # v3/e8cf_unc setting (best sweep metric)
  nonlinear_consequents: true
  consequent_hidden: 32
  init_scale: 0.1
  mlp_lr_multiplier: 10.0   # MLP gets 10× model lr
  reagg_mu: 10.0             # quadratic regularizer for hyperparams toward defaults
  mlp_min_norm: 5.0          # anti-collapse: penalize if ||W|| < this
  mlp_norm_gamma: 1.0        # anti-collapse penalty strength
