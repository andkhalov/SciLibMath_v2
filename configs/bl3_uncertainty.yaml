# BL3: Uncertainty Weighting (Kendall et al. CVPR 2018)
# Baseline for EXP-013: replaces T-S fuzzy controller with learned log-variance parameters
# Same composite loss structure as E8c, adaptive modality weights via uncertainty
experiment: bl3_uncertainty

model:
  visual_backbone: convnext_pico.d1_in1k

loss:
  type: composite
  tau: 0.07
  p_drop: 0.3
  lambda_align: 0.3
  lambda_rad: 0.1
  lambda_reg: 0.05
  lambda_va: 0.01
  w_g: 1.0
  C_clip: 10.0
  rho: 0.1
  alpha_tau: 0.5
  tau_target: 0.0
  tau_min: 0.01
  tau_max: 0.5
  weights:
    en: 1.0
    ru: 1.0
    lean: 1.0
    latex: 1.0
    img: 1.0

# Uncertainty Weighting config
baseline:
  type: uncertainty
  init_val: 0.0  # s_m(0) = 0 → σ²=1 → weight=1
