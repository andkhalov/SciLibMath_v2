# E6: Composite loss + Fuzzy T-S controller (Variant D — stochastic)
# Ref: MATH.md M.3.6, M.6, M.6.3b
experiment: e6_fuzzy

loss:
  type: composite
  tau: 0.07
  p_drop: 0.3
  lambda_align: 0.3
  lambda_rad: 0.1
  lambda_reg: 0.05
  lambda_va: 0.1
  w_g: 1.0
  C_clip: 10.0
  rho: 0.1
  alpha_tau: 0.5
  tau_target: 0.0
  tau_min: 0.01
  tau_max: 0.5
  weights:
    en: 1.0
    ru: 1.0
    lean: 1.5
    latex: 1.5
    img: 1.0

controller:
  alpha: 0.001            # step size (reduced from 0.05 — EXP-001 corner-crashing fix)
  warmup_steps: 200       # increased from 50
  step_frequency: 10      # apply controller every K steps (was 1)
  noise_sigma: 0.01       # stochastic exploration noise σ_0
  noise_anneal: true      # linear σ annealing to 0
  elastic_gamma: 0.01     # mean-reversion coefficient γ
