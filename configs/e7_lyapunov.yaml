# E7: E6 + Lyapunov soft stability constraint (Variant D)
# Ref: MATH.md M.3.7, M.7, M.7.2b
experiment: e7_lyapunov

loss:
  type: composite
  tau: 0.07
  p_drop: 0.3
  lambda_align: 0.3
  lambda_rad: 0.1
  lambda_reg: 0.05
  lambda_va: 0.1
  w_g: 1.0
  C_clip: 10.0
  rho: 0.1
  alpha_tau: 0.5
  tau_target: 0.0
  tau_min: 0.01
  tau_max: 0.5
  weights:
    en: 1.0
    ru: 1.0
    lean: 1.5
    latex: 1.5
    img: 1.0

controller:
  alpha: 0.001            # step size (reduced from 0.05)
  warmup_steps: 200       # increased from 50
  step_frequency: 10      # apply controller every K steps
  noise_sigma: 0.01       # stochastic exploration noise
  noise_anneal: true      # linear σ annealing
  elastic_gamma: 0.01     # mean-reversion coefficient

lyapunov:
  alpha: 1.0              # V_t weight for normalized loss
  beta: 0.1               # V_t weight for ||Δλ||²
  gamma: 0.5              # V_t weight for Var_m(w_m)
  penalty_weight: 0.5     # soft constraint weight (was 0.1 — too weak, E7≈E6)
  xi: 0.001               # threshold for allowable V growth (was 0.01 — too permissive)
