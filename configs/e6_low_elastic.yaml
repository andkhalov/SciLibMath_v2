# E6_low_elastic: Fuzzy T-S controller with reduced elastic regularization
# Ref: EXP-009 — test whether lower elastic_gamma gives controller more freedom
# Based on e6_fuzzy.yaml with elastic_gamma: 0.0005 (was 0.002, /4)
# alpha/gamma ratio: 0.005/0.0005 = 10.0 (was 2.5)
experiment: e6_low_elastic

loss:
  type: composite
  tau: 0.07
  p_drop: 0.3
  lambda_align: 0.3
  lambda_rad: 0.1
  lambda_reg: 0.05
  lambda_va: 0.1
  w_g: 1.0
  C_clip: 10.0
  rho: 0.1
  alpha_tau: 0.5
  tau_target: 0.0
  tau_min: 0.01
  tau_max: 0.5
  weights:
    en: 1.0
    ru: 1.0
    lean: 1.5
    latex: 1.5
    img: 1.0

controller:
  alpha: 0.005
  warmup_steps: 200
  step_frequency: 10
  noise_sigma: 0.01
  noise_anneal: true
  elastic_gamma: 0.0005      # EXP-009: /4 from 0.002 (alpha/gamma = 10.0)
