# E9 ConvNeXt: Potential loss + LossMixer + ConvNeXt-Tiny backbone
# Ref: MATH.md M.1.2, M.3.9
experiment: e9_potential_cnxt

model:
  visual_backbone: convnext_pico.d1_in1k

loss:
  type: composite
  tau: 0.07
  p_drop: 0.3
  lambda_reg: 0.05
  lambda_va: 0.1
  C_clip: 10.0
  rho: 0.1
  alpha_tau: 0.5
  tau_target: 0.0
  tau_min: 0.01
  tau_max: 0.5
  use_potential: true
  k_a: 1.0
  k_r: 0.1

mixer:
  hidden_dim: 64
