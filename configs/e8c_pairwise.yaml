# E8c_pairwise: Nonlinear controller + PAIRWISE global contrastive (instead of centroid)
# Ref: EXP-009 — test whether pairwise InfoNCE as global loss helps E8c
# Based on e8c_active.yaml with contrast_mode: pairwise
experiment: e8c_pairwise

loss:
  type: composite
  tau: 0.07
  p_drop: 0.3
  lambda_align: 0.3
  lambda_rad: 0.1
  lambda_reg: 0.05
  lambda_va: 0.1
  w_g: 1.0
  C_clip: 10.0
  rho: 0.1
  alpha_tau: 0.5
  tau_target: 0.0
  tau_min: 0.01
  tau_max: 0.5
  contrast_mode: pairwise    # EXP-009: use PairwiseInfoNCE for global contrastive
  weights:
    en: 1.0
    ru: 1.0
    lean: 1.5
    latex: 1.5
    img: 1.0

controller:
  alpha: 0.01
  warmup_steps: 200
  step_frequency: 10
  noise_sigma: 0.01
  noise_anneal: true
  elastic_gamma: 0.002
  nonlinear_consequents: true
  consequent_hidden: 32
  init_scale: 0.1
